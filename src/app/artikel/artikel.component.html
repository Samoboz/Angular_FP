<article class="card shadow-sm mb-4">
  <div class="card-body">
    <h2 class="card-title h4">{{ article.titel }}</h2>
    <h6 class="card-subtitle mb-3 text-muted">
      Von {{ article.autor }} am {{ article.datum }}
    </h6>
    <p class="card-text">{{ article.content }}</p>
  </div>
</article>
